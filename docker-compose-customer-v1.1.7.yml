
services:
  # MySQL 数据库
  mysql-canal:
    image: registry.cn-heyuan.aliyuncs.com/gzdzh/mysql:8.0
    container_name: mysql-canal
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: dzh123456
      MYSQL_DATABASE: dzhgo_go
      MYSQL_USER: canal
      MYSQL_PASSWORD: canal123
    ports:
      - "33306:3306"
    volumes:
      - ./docker/mysql/conf/my.cnf:/etc/mysql/conf.d/my.cnf
      - ./docker/mysql/data:/var/lib/mysql
      - ./docker/mysql/backup:/home/backup
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "canal", "-pcanal123"]
      timeout: 20s
      retries: 10
      interval: 10s
      start_period: 30s
    networks:
      - canal-network

