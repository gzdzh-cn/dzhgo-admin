server:
  address:     ":8200"
  openapiPath: "/api.json"
  swaggerPath: "/swagger"
  #  dumpRouterMap: false #关闭路由打印
  serverRoot: "resource/public"
  clientMaxBodySize: 104857600  # 100MB in bytes 100*1024*1024


database:
  # 数据库配置
  default:
      type: "mysql"
      host: "127.0.0.1" # mac本地docker运行写host.docker.internal，可以读取宿主机mysql
      port: "13308"
      user: "root"
      pass: "dzh123456"
      name: "dzh3136_go" #dzhgo_go
      charset: "utf8mb4"
      timezone: "Asia/Shanghai"
      createdAt: "createTime"
      updatedAt: "updateTime"
      deletedAt: "deletedAt"  # 填deleteTime，关闭软删除，填deletedAt开启软删除
      debug: true #开启调试模式,启用后将在控制台打印相关sql语句
  # default:
    # type: "sqlite" # 数据库类型
    # name: "./data/database/dzhgo_go.sqlite" # 数据库名称,对于sqlite来说就是数据库文件名
    # extra: busy_timeout=5000 # 扩展参数 如 busy_timeout=5000&journal_mode=ALL
    # createdAt: "createTime" # 创建时间字段名称
    # updatedAt: "updateTime" # 更新时间字段名称
    # deletedAt: "deletedAt"  # 填deleteTime，关闭软删除，填deletedAt开启软删除
    # debug: true # 开启调试模式,启用后将在控制台打印相关sql语句


# Redis 配置示例
redis:
  enable: true # 开启 redis 缓存
  cfRedis:
    address: "127.0.0.1:16379"  # mac本地docker运行写host.docker.internal，可以读取宿主机mysql
    db: 1
    pass: "335566"
    expire: 1296000 # 24*3600*15 过期时间，单位毫秒
  dbRedis:
    address: "127.0.0.1:16379"  # mac本地docker运行写host.docker.internal，可以读取宿主机mysql
    enable: false ##开启 sql 查询后缓存到 redis
    expire: 60000 # 60*1000 过期时间，单位毫秒
    db: 9

# ClickHouse 配置
clickhouse:
  host: "127.0.0.1"
  port: 8123
  user: "default"
  password: "dzh123456"
  database: "dzh3136_go"
  timeout: 30  # 请求超时时间（秒）


core:
  appName: "dzhgo" # 桌面端使用，给生产环境时，生成日志路径使用，macos会在系统 /Users/****/Library/Application Support/ 目录下建一个 dzhgo 目录
  isDesktop: false # 桌面端运行
  isProd: false # 桌面端才设置指定是否是生产模式，生产模式的日志路径为系统目录，下面日志的路径参数在生产模式下会失效
  autoMigrate: true #自动建表
  eps: true # 生成前端请求路由
  notice:
    enable: true # 开启通知队列功能
    send: 5 # 发送时间，单位秒，60秒发送一次数据
    cleanup: 2 # 清理时间，单位秒，定时检查一次连接状态
    expire: 10 # 过期时间，单位秒，超过此时间，连接将被清理
  # gf 自带数据库日志配置
  sqlLogger:
    path: "./data/logs/sql"
    file: "sql-{Y-m-d}.log"
    level: "all"
    stdout: true # 控制台打印sql
  # gf自带的log日志配置
  gfLogger:
    path: "./data/logs/" #服务器端，如果不写此参数，开发环境和生产环境默认路径：./data/logs/run/，如果是桌面端，不写此参数，开发环境默认是./data/logs/run/，生产环境此参数失效，默认是系统 appdata 或 Library 目录里面
    file: "{Y-m-d}.log"
    level : "debug"
    stdout: true
    flags: 44
  # 带吞吐量，响应时间参数的http 请求日志
  runLogger:
    path: "./data/logs/run/" # 服务器端，如果不写此参数，开发环境和生产环境默认路径：./data/logs/run/，如果是桌面端，不写此参数，开发环境默认是./data/logs/run/，生产环境此参数失效，默认是系统 appdata 或 Library 目录里面
    enable: true # 开启
    file: "run-{Y-m-d}.log"
    rotateSize: 3MB #切割大小，要带单位写，例如MB，KB
    stdout: false # 开启控制台输出
  # 文件上传配置
  file:
    mode: "local" #oss,local
    filePrefix: "" #mode参数为local 上传图片文件目录映射，如果不传，会默认录入 http://域名+图片相对路径，如果填写dzhimg，就会录入 /dzhimg + 图片相对地址
    uploadPath: "/public/uploads"
    oss: # oss配置项兼容 minio oss 需要配置bucket公开读
      endpoint: ""
      accessKeyID: ""
      secretAccessKey: ""
      bucketName: ""
      useSSL: false
      location: ""
     
modules:
  base:
    jwt:
      sso: false
      secret: "dzhgo"
      token:
        expire: 604800 # 24 * 3600 * 7
        refreshExpire: 1296000 # 24*3600*15
    middleware:
      cors: true # 跨域
      authority:
        enable: true # 开启中间件监听
      log:
        enable: true
        ignorePath: "/admin/base/sys/log/getKeep" #忽略日志写入的路径
        ignoreReg: "/(page|list)$" #page和list结尾的链接忽略日志写入
    # 客户端请求代理
    http:
      proxy_open: false  # 代理开关
      proxy_url: ""  # 代理地址

    img:
      cdn_url: ""
