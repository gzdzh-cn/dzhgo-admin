  # Elasticsearch
  elasticsearch:
    image: j0y60snygwu8b60dmu.xuanyuan.run/elasticsearch:8.1.0
    container_name: elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - xpack.security.http.ssl.enabled=false
    deploy:
      replicas: 1
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - ./docker-data/elasticsearch/data:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
    networks:
      - dzh3136-network

  # Kibana (可选，用于ES管理)
  kibana:
    image: j0y60snygwu8b60dmu.xuanyuan.run/kibana:8.1.0
    container_name: kibana
    restart: always
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"
    volumes:
      - ./docker-data/kibana/config/kibana.yml:/usr/share/kibana/config/kibana.yml
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    networks:
      - dzh3136-network

