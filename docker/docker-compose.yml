
services:
  customer_pro:
    container_name: customer_pro
    image: registry.cn-heyuan.aliyuncs.com/gzdzh/customer_pro:v1.2.8
    restart: always
    ports:
      - 3136:3136
    # network_mode: host  # 相当于 --network="host"  linux线上使用
    environment:
      TZ: Asia/Shanghai # 指定时区
    volumes:
      - ./docker-data/site/data/:/app/data/
      - ./docker-data/site/config/:/app/config/
      - /www/wwwroot/:/www/wwwroot/
      - ./docker-data/site/resource/:/app/resource/
      - ./docker-data/site/public/:/app/public/
    networks:
      - dzh3136-network

  # ============================================================
  # ClickHouse 服务（OLAP 查询数据库）
  # ============================================================
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: clickhouse
    restart: always
    ports:
      - "8123:8123"  # HTTP 接口（用于 HTTP 查询）
      - "9000:9000"  # Native 接口（用于 ClickHouse Client）
    environment:
      TZ: Asia/Shanghai  # 时区设置
      CLICKHOUSE_DB: dzh3136_go  # 数据库名
      CLICKHOUSE_USER: default  # 用户名
      CLICKHOUSE_PASSWORD: dzh123456  # 密码
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1  # 允许默认管理
      CLICKHOUSE_MAX_MEMORY_USAGE: 0.6  # 最大内存使用（60%）
      CLICKHOUSE_MAX_SERVER_MEMORY_USAGE: 0.6  # 最大服务器内存使用（60%）
      CLICKHOUSE_MAX_THREADS: 16  # 最大线程数
      CLICKHOUSE_MAX_CONCURRENT_QUERIES: 32  # 最大并发查询数
    volumes:
      - ./docker-data/clickhouse/data:/var/lib/clickhouse
      - ./docker-data/clickhouse/logs:/var/log/clickhouse-server
      - ./docker-data/clickhouse/config:/etc/clickhouse-server/config.d
      - ./docker-data/clickhouse/user-files:/var/lib/clickhouse/user_files
      - ./docker-data/clickhouse/tmp:/tmp/clickhouse-server
    ulimits:
      # 文件句柄限制（ClickHouse 推荐配置）
      nofile:
        soft: 65536
        hard: 65536
      # 内存限制（根据服务器配置调整）
      memlock:
        soft: 8589934592  # 8GB
        hard: 12884901888  # 12GB
    networks:
      - dzh-mysql-network
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user default --password dzh123456 -q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Canal Server（读取 MySQL binlog）
  # ============================================================
  canal-server:
    image: canal/canal-server:v1.1.7
    container_name: canal-server
    restart: always
    depends_on:
      - clickhouse
    ports:
      - "11111:11111"  # Canal Server 端口
    environment:
      TZ: Asia/Shanghai
      canal.instance.master.address: mysql80:3306
      canal.instance.dbUsername: root
      canal.instance.dbPassword: dzh123456
      canal.instance.connectionCharset: UTF-8
      canal.instance.filter.regex: dzh3136_go\\.addons_customer_pro_clues
      canal.mq.servers: canal-adapter:11111
    volumes:
      - ./docker-data/canal-server/conf:/home/admin/canal-server/conf
      - ./docker-data/canal-server/logs:/home/admin/canal-server/logs
    networks:
      - dzh-mysql-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:11111 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================================
  # Canal Adapter（写入 ClickHouse）
  # ============================================================
  canal-adapter:
    image: canal/canal-adapter:v1.1.7
    container_name: canal-adapter
    restart: always
    depends_on:
      - canal-server
      - clickhouse
    ports:
      - "8081:8081"  # Adapter 管理端口
    volumes:
      - ./docker-data/canal-adapter/conf:/opt/canal-adapter/conf
    networks:
      - dzh-mysql-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8081 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s


  # ============================================================
  # MySQL to ClickHouse 同步服务
  # ============================================================
  mysql_to_clickhouse:
    image: registry.cn-heyuan.aliyuncs.com/gzdzh/mysql_to_clickhouse:v1.0.0
    container_name: mysql_to_clickhouse
    restart: always
    depends_on:
      - clickhouse
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./docker-data/mysql_to_clickhouse/config:/app/config
      - ./docker-data/mysql_to_clickhouse/logs:/app/logs
    networks:
      - dzh-mysql-network
    healthcheck:
      test: ["CMD-SHELL", "pgrep sync-service || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  dzh-mysql-network:
    external: true
    name: dzh-dzh-mysql-network