filebeat.inputs:
# 收集应用日志
- type: log
  enabled: true
  paths:
    - /var/log/app/*.log
    - /var/log/app/*.txt
    - /var/log/app-logs/*.log
    - /var/log/app-logs/**/*.log
    - /var/log/app-logs/**/*.txt
  fields:
    log_type: application
  fields_under_root: true

# 收集Docker容器日志
- type: container
  enabled: true
  paths:
    - '/var/lib/docker/containers/*/*.log'
  fields:
    log_type: docker
  fields_under_root: true

# 收集系统日志
- type: log
  enabled: true
  paths:
    - /var/log/syslog
    - /var/log/messages
  fields:
    log_type: system
  fields_under_root: true

processors:
  - add_host_metadata:
      when.not.contains.tags: forwarded
  - add_docker_metadata: ~

# 输出到Logstash
output.logstash:
  hosts: ["logstash:5044"]

# 日志配置
logging.level: info
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat
  keepfiles: 7
  permissions: 0644
